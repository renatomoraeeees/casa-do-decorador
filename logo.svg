<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <clipPath id="sc">
      <rect x="5" y="168" width="310" height="52"/>
    </clipPath>
  </defs>

  <!-- Chimney -->
  <rect x="205" y="96" width="32" height="78" fill="#111111" rx="2"/>

  <!-- Roof -->
  <polygon points="155,58 308,172 2,172" fill="#111111"/>

  <!-- House body base -->
  <rect x="5" y="168" width="310" height="142" rx="3" fill="#BAE9E4"/>

  <!-- Pink scalloped awning trim -->
  <g clip-path="url(#sc)">
    <circle cx="24"  cy="167" r="20" fill="#E896B5"/>
    <circle cx="59"  cy="167" r="20" fill="#E896B5"/>
    <circle cx="94"  cy="167" r="20" fill="#E896B5"/>
    <circle cx="129" cy="167" r="20" fill="#E896B5"/>
    <circle cx="164" cy="167" r="20" fill="#E896B5"/>
    <circle cx="199" cy="167" r="20" fill="#E896B5"/>
    <circle cx="234" cy="167" r="20" fill="#E896B5"/>
    <circle cx="269" cy="167" r="20" fill="#E896B5"/>
    <circle cx="304" cy="167" r="20" fill="#E896B5"/>
  </g>

  <!-- House body fill over scallop centers -->
  <rect x="5" y="187" width="310" height="123" fill="#BAE9E4"/>

  <!-- House outer border -->
  <rect x="5" y="168" width="310" height="142" rx="3" fill="none" stroke="#111111" stroke-width="6"/>

  <!-- Bottom dark strip -->
  <rect x="5" y="298" width="310" height="12" rx="3" fill="#111111"/>

  <!-- "Casa do" text -->
  <text x="160" y="226"
        text-anchor="middle"
        font-family="'Dancing Script', 'Segoe Script', cursive"
        font-size="44"
        font-weight="700"
        fill="#7A1535">Casa do</text>

  <!-- "Decorador" text -->
  <text x="160" y="282"
        text-anchor="middle"
        font-family="'Dancing Script', 'Segoe Script', cursive"
        font-size="54"
        font-weight="700"
        fill="#7A1535">Decorador</text>

  <!-- Balloon strings from chimney top -->
  <path d="M221,94 C215,74 207,54 200,34" fill="none" stroke="#C0C0C0" stroke-width="1.8"/>
  <path d="M221,94 C221,74 221,54 221,32" fill="none" stroke="#C0C0C0" stroke-width="1.8"/>
  <path d="M221,94 C228,74 236,54 242,36" fill="none" stroke="#C0C0C0" stroke-width="1.8"/>

  <!-- Balloon knots -->
  <ellipse cx="200" cy="36" rx="3.5" ry="4" fill="#E090C0"/>
  <ellipse cx="221" cy="34" rx="3.5" ry="4" fill="#F0B0CC"/>
  <ellipse cx="242" cy="38" rx="3.5" ry="4" fill="#B51848"/>

  <!-- Balloon 1 — pink left -->
  <ellipse cx="200" cy="18" rx="17" ry="21" fill="#E090C0"/>
  <ellipse cx="196" cy="12" rx="6"  ry="7"  fill="rgba(255,255,255,0.40)"/>
  <ellipse cx="200" cy="38" rx="2.5" ry="3" fill="#CB70A8"/>

  <!-- Balloon 2 — light pink middle -->
  <ellipse cx="221" cy="13" rx="17" ry="21" fill="#F0B8D0"/>
  <ellipse cx="217" cy="7"  rx="6"  ry="7"  fill="rgba(255,255,255,0.40)"/>
  <ellipse cx="221" cy="33" rx="2.5" ry="3" fill="#D898B8"/>

  <!-- Balloon 3 — deep magenta right -->
  <ellipse cx="242" cy="17" rx="18" ry="22" fill="#B81848"/>
  <ellipse cx="238" cy="11" rx="6"  ry="7.5" fill="rgba(255,255,255,0.30)"/>
  <ellipse cx="242" cy="38" rx="2.5" ry="3" fill="#901036"/>
</svg>
